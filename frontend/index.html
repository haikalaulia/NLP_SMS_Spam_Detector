<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SpamSense — Detektor SMS Spam Indonesia</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root, [data-theme="dark"] {
  --bg:          #0a0b0f;
  --surface:     #111318;
  --surface2:    #191c24;
  --border:      rgba(255,255,255,0.07);
  --border2:     rgba(255,255,255,0.13);
  --text:        #e8eaf0;
  --text-muted:  #6b7280;
  --text-dim:    #4b5563;
  --shadow:      rgba(0,0,0,0.5);
  --blob-op:     0.28;
  --grain-op:    0.025;

  --green:       #22c55e;
  --amber:       #f59e0b;
  --red:         #ef4444;
  --blue:        #3b82f6;
  --accent:      #6366f1;
  --accent2:     #8b5cf6;
  --accent-text: #a5b4fc;

  --result-normal-bg:    rgba(34,197,94,0.05);
  --result-normal-bd:    rgba(34,197,94,0.25);
  --result-promo-bg:     rgba(245,158,11,0.05);
  --result-promo-bd:     rgba(245,158,11,0.25);
  --result-penipuan-bg:  rgba(239,68,68,0.05);
  --result-penipuan-bd:  rgba(239,68,68,0.25);

  --radius:    16px;
  --radius-sm: 10px;
  --font-display: 'Syne', sans-serif;
  --font-body:    'DM Sans', sans-serif;
  --font-mono:    'DM Mono', monospace;
}

[data-theme="light"] {
  --bg:          #f4f5f7;
  --surface:     #ffffff;
  --surface2:    #f0f1f4;
  --border:      rgba(0,0,0,0.08);
  --border2:     rgba(0,0,0,0.14);
  --text:        #111318;
  --text-muted:  #6b7280;
  --text-dim:    #9ca3af;
  --shadow:      rgba(0,0,0,0.08);
  --blob-op:     0.1;
  --grain-op:    0.015;

  --accent-text: #4f46e5;

  --result-normal-bg:    rgba(34,197,94,0.06);
  --result-normal-bd:    rgba(34,197,94,0.3);
  --result-promo-bg:     rgba(245,158,11,0.06);
  --result-promo-bd:     rgba(245,158,11,0.3);
  --result-penipuan-bg:  rgba(239,68,68,0.06);
  --result-penipuan-bd:  rgba(239,68,68,0.3);
}

[data-theme="light"] h1 {
  background: linear-gradient(135deg, #1e1b4b 20%, #4f46e5 55%, #7c3aed 90%) !important;
  -webkit-background-clip: text !important;
  -webkit-text-fill-color: transparent !important;
  background-clip: text !important;
}
[data-theme="light"] .blob-1 { background: #818cf8; }
[data-theme="light"] .blob-2 { background: #f472b6; }
[data-theme="light"] .blob-3 { background: #60a5fa; }

html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 15px;
  line-height: 1.6;
  min-height: 100vh;
  overflow-x: hidden;
  transition: background 0.3s, color 0.3s;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity: var(--grain-op);
  pointer-events: none;
  z-index: 9999;
}

.blob {
  position: fixed; border-radius: 50%;
  filter: blur(120px); pointer-events: none; z-index: 0;
  opacity: var(--blob-op);
  animation: drift 20s ease-in-out infinite alternate;
  transition: opacity 0.4s;
}
.blob-1 { width:600px;height:600px; background:var(--accent); top:-200px;right:-200px; }
.blob-2 { width:400px;height:400px; background:#ec4899; bottom:-100px;left:-100px; animation-delay:-7s; }
.blob-3 { width:300px;height:300px; background:var(--blue); top:40%;left:40%; animation-delay:-14s; }
@keyframes drift {
  from { transform: translate(0,0) scale(1); }
  to   { transform: translate(40px,-40px) scale(1.1); }
}

.wrapper {
  position: relative; z-index: 1;
  max-width: 900px; margin: 0 auto;
  padding: 60px 24px 100px;
}

.topbar {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: 100;
  display: flex; justify-content: flex-end;
  padding: 14px 28px;
}

.theme-toggle {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 6px 14px 6px 10px;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 2px 12px var(--shadow);
}
.theme-toggle:hover { border-color: var(--border2); }
.theme-toggle svg { width:16px;height:16px; flex-shrink:0; }
.theme-toggle-label {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-muted);
}

header {
  text-align: center; margin-bottom: 52px;
  animation: fadeUp 0.7s ease both;
}
.badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(99,102,241,0.1);
  border: 1px solid rgba(99,102,241,0.25);
  border-radius: 999px; padding: 4px 14px;
  font-family: var(--font-mono); font-size: 11px;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--accent-text); margin-bottom: 20px;
}
.badge-dot {
  width:6px;height:6px;border-radius:50%;
  background:var(--accent); box-shadow:0 0 8px var(--accent);
  animation: pulse 2s ease infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

h1 {
  font-family: var(--font-display);
  font-size: clamp(2.6rem,6vw,4rem);
  font-weight: 800; line-height: 1.05;
  letter-spacing: -0.03em;
  background: linear-gradient(135deg,#fff 30%,#a5b4fc 60%,#f9a8d4 90%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 16px;
  transition: background 0.3s;
}
.tagline {
  font-size: 15px; color: var(--text-muted);
  max-width: 460px; margin: 0 auto; font-weight: 300;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  animation: fadeUp 0.7s ease both;
  box-shadow: 0 2px 20px var(--shadow);
  transition: background 0.3s, border-color 0.3s;
}
.card + .card { margin-top: 20px; }
.card-header {
  padding: 16px 22px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
  transition: border-color 0.3s;
}
.card-header svg { width:15px;height:15px; color:var(--text-muted); flex-shrink:0; }
.card-title {
  font-family: var(--font-display); font-weight: 700;
  font-size: 12px; letter-spacing: 0.06em;
  text-transform: uppercase; color: var(--text-muted);
}
.card-body { padding: 22px; }

.model-tabs {
  display: flex; gap: 6px; margin-bottom: 18px;
  background: var(--surface2); padding: 4px;
  border-radius: var(--radius-sm);
  transition: background 0.3s;
}
.tab-btn {
  flex: 1; padding: 9px 14px;
  background: transparent; border: none;
  border-radius: 7px;
  font-family: var(--font-body); font-size: 13px; font-weight: 500;
  color: var(--text-muted); cursor: pointer;
  transition: all 0.2s; white-space: nowrap;
}
.tab-btn:hover { color: var(--text); background: rgba(99,102,241,0.06); }
.tab-btn.active {
  background: var(--surface); color: var(--text);
  box-shadow: 0 1px 8px var(--shadow);
}
.tab-btn .model-badge {
  display: inline-block; font-size: 10px;
  font-family: var(--font-mono);
  background: rgba(99,102,241,0.12); color: var(--accent-text);
  padding: 2px 6px; border-radius: 4px; margin-left: 6px;
}
.tab-btn.active .model-badge { background: rgba(99,102,241,0.22); }

.input-wrap { position: relative; }
textarea {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: var(--font-body); font-size: 14.5px; line-height: 1.7;
  padding: 16px; resize: none; min-height: 130px;
  transition: border-color 0.2s, box-shadow 0.2s, background 0.3s, color 0.3s;
  outline: none;
}
textarea::placeholder { color: var(--text-dim); }
textarea:focus {
  border-color: rgba(99,102,241,0.5);
  box-shadow: 0 0 0 3px rgba(99,102,241,0.08);
}
.char-count {
  position: absolute; bottom:12px; right:14px;
  font-family: var(--font-mono); font-size: 11px; color: var(--text-dim);
}

.examples-wrap { margin-top: 12px; display:flex; flex-wrap:wrap; gap:6px; }
.ex-label {
  font-size: 11px; color: var(--text-dim);
  font-family: var(--font-mono); letter-spacing: 0.06em;
  text-transform: uppercase; align-self: center; margin-right: 4px;
}
.ex-pill {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 999px; padding: 4px 12px;
  font-size: 12px; color: var(--text-muted);
  cursor: pointer; transition: all 0.2s;
}
.ex-pill:hover {
  border-color: rgba(99,102,241,0.4);
  color: var(--accent-text);
  background: rgba(99,102,241,0.06);
}

.action-row {
  display: flex; align-items: center;
  justify-content: space-between;
  margin-top: 16px; gap: 12px;
}
.btn-analyze {
  display: flex; align-items: center; gap: 8px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none; border-radius: var(--radius-sm);
  color: #fff; font-family: var(--font-display);
  font-size: 14px; font-weight: 700;
  padding: 11px 26px; cursor: pointer; letter-spacing: 0.02em;
  transition: all 0.2s;
  box-shadow: 0 4px 18px rgba(99,102,241,0.3);
}
.btn-analyze:hover { transform:translateY(-1px); box-shadow:0 8px 28px rgba(99,102,241,0.4); }
.btn-analyze:active { transform:translateY(0); }
.btn-analyze:disabled { opacity:0.45; cursor:not-allowed; transform:none; box-shadow:none; }
.btn-clear {
  background: transparent; border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text-muted);
  font-family: var(--font-body); font-size: 13px;
  padding: 11px 18px; cursor: pointer; transition: all 0.2s;
}
.btn-clear:hover { border-color: var(--border2); color: var(--text); }

.api-status { display:flex; align-items:center; gap:6px; }
.status-dot {
  width:7px;height:7px;border-radius:50%;
  background: var(--text-dim); transition: background 0.3s;
}
.status-dot.online  { background:var(--green); box-shadow:0 0 6px var(--green); }
.status-dot.offline { background:var(--red);   box-shadow:0 0 6px var(--red); }
.status-text {
  font-family: var(--font-mono); font-size: 11px; color: var(--text-dim);
  transition: color 0.2s;
}

#result-section {
  margin-top: 20px; opacity: 0;
  transform: translateY(16px);
  transition: opacity 0.4s ease, transform 0.4s ease;
}
#result-section.visible { opacity:1; transform:translateY(0); }

.result-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
}
@media (max-width:620px) { .result-grid { grid-template-columns:1fr; } }

.model-result-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 20px;
  animation: fadeUp 0.5s ease both;
  transition: background 0.3s, border-color 0.3s;
}
.model-result-card.result-normal   { border-color:var(--result-normal-bd);   background:var(--result-normal-bg); }
.model-result-card.result-promo    { border-color:var(--result-promo-bd);    background:var(--result-promo-bg); }
.model-result-card.result-penipuan { border-color:var(--result-penipuan-bd); background:var(--result-penipuan-bg); }

.result-model-name {
  font-family: var(--font-mono); font-size: 11px;
  text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--text-muted); margin-bottom: 12px;
}
.result-label-wrap {
  display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
}

.result-indicator {
  width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0;
}
.result-indicator.normal   { background: var(--green); }
.result-indicator.promo    { background: var(--amber); }
.result-indicator.penipuan { background: var(--red); }

.result-label {
  font-family: var(--font-body); font-size: 20px;
  font-weight: 700; text-transform: capitalize; letter-spacing: -0.01em;
}
.result-label.normal   { color: var(--green); }
.result-label.promo    { color: var(--amber); }
.result-label.penipuan { color: var(--red); }

.confidence-block { margin-bottom: 14px; }
.conf-header {
  display: flex; justify-content: space-between;
  font-size: 11px; color: var(--text-muted);
  font-family: var(--font-mono); margin-bottom: 6px;
}
.conf-val { color: var(--text); font-weight: 500; }
.conf-bar-bg {
  height: 6px; background: rgba(128,128,128,0.12);
  border-radius: 99px; overflow: hidden;
}
.conf-bar-fill {
  height: 100%; border-radius: 99px;
  transition: width 0.8s cubic-bezier(.4,0,.2,1);
}
.conf-bar-fill.normal   { background: linear-gradient(90deg,#16a34a,#22c55e); }
.conf-bar-fill.promo    { background: linear-gradient(90deg,#d97706,#f59e0b); }
.conf-bar-fill.penipuan { background: linear-gradient(90deg,#dc2626,#ef4444); }

.scores-wrap { display:flex; flex-direction:column; gap:7px; }
.score-row { display:flex; align-items:center; gap:10px; font-size:12px; }
.score-name {
  width:68px; font-family:var(--font-mono); font-size:11px;
  color:var(--text-muted); text-transform:capitalize;
}
.score-bar-bg {
  flex:1; height:4px; background:rgba(128,128,128,0.1);
  border-radius:99px; overflow:hidden;
}
.score-bar-fill {
  height:100%; border-radius:99px;
  transition:width 0.8s cubic-bezier(.4,0,.2,1) 0.1s;
}
.score-bar-fill.normal   { background:var(--green); }
.score-bar-fill.promo    { background:var(--amber); }
.score-bar-fill.penipuan { background:var(--red); }
.score-pct {
  font-family:var(--font-mono); font-size:11px;
  color:var(--text-muted); min-width:38px; text-align:right;
}
.result-meta {
  margin-top:14px; padding-top:12px; border-top:1px solid var(--border);
  display:flex; justify-content:space-between;
  font-family:var(--font-mono); font-size:10.5px; color:var(--text-dim);
}
.meta-mode {
  padding:2px 8px; border-radius:4px;
  background:rgba(128,128,128,0.08);
}

.verdict-card {
  margin-top:16px; background:var(--surface2);
  border:1px solid var(--border); border-radius:var(--radius-sm);
  padding:16px 20px; display:flex; align-items:flex-start; gap:14px;
  transition: background 0.3s, border-color 0.3s;
}
.verdict-icon-wrap {
  width: 32px; height: 32px; border-radius: 8px;
  background: rgba(99,102,241,0.1);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.verdict-icon-wrap svg { width:16px;height:16px; color:var(--accent); }
.verdict-text { font-size:13.5px; color:var(--text-muted); line-height:1.6; }
.verdict-text strong { color:var(--text); }

.legend {
  display:flex; gap:20px; flex-wrap:wrap;
  padding:14px 22px; margin-top:20px;
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius-sm);
  animation: fadeUp 0.7s ease 0.3s both;
  transition: background 0.3s, border-color 0.3s;
}
.legend-item { display:flex; align-items:center; gap:8px; font-size:13px; }
.legend-dot {
  width:9px;height:9px;border-radius:2px;
}
.legend-dot.normal   { background:var(--green); }
.legend-dot.promo    { background:var(--amber); }
.legend-dot.penipuan { background:var(--red); }

.spinner {
  display:none; width:16px;height:16px;
  border:2px solid rgba(255,255,255,0.25);
  border-top-color:#fff; border-radius:50%;
  animation:spin 0.7s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }

@keyframes fadeUp {
  from { opacity:0; transform:translateY(18px); }
  to   { opacity:1; transform:translateY(0); }
}
.card:nth-child(2) { animation-delay:0.1s; }
.card:nth-child(3) { animation-delay:0.2s; }

::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--surface2); border-radius:3px; }
</style>
</head>

<body>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<div class="topbar">
  <button class="theme-toggle" id="theme-toggle" title="Ganti tema">
    <svg id="icon-sun" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
    <svg id="icon-moon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="display:none">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
    <span class="theme-toggle-label" id="theme-label">Light</span>
  </button>
</div>

<div class="wrapper">

  <header>
    <div class="badge">
      <span class="badge-dot"></span>
      NLP · IndoBERT vs XLM-RoBERTa
    </div>
    <h1>SpamSense</h1>
    <p class="tagline">Detektor SMS Spam Bahasa Indonesia berbasis deep learning — klasifikasi tiga kelas secara real-time.</p>
  </header>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot normal"></div><span>Normal — pesan biasa</span></div>
    <div class="legend-item"><div class="legend-dot promo"></div><span>Promo — iklan / penawaran operator</span></div>
    <div class="legend-item"><div class="legend-dot penipuan"></div><span>Penipuan — scam / phishing</span></div>
  </div>

  <div class="card" style="margin-top:20px;">
    <div class="card-header">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <span class="card-title">Analisis Pesan SMS</span>
    </div>
    <div class="card-body">

      <div class="model-tabs">
        <button class="tab-btn active" data-model="both">Bandingkan Keduanya</button>
        <button class="tab-btn" data-model="indobert">
          IndoBERT <span class="model-badge">mono</span>
        </button>
        <button class="tab-btn" data-model="xlmroberta">
          XLM-RoBERTa <span class="model-badge">multi</span>
        </button>
      </div>

      <div class="input-wrap">
        <textarea id="sms-input"
          placeholder="Ketik atau tempel teks SMS di sini..."
          maxlength="500"></textarea>
        <span class="char-count" id="char-count">0 / 500</span>
      </div>

      <div class="examples-wrap">
        <span class="ex-label">Contoh</span>
        <button class="ex-pill" data-text="Halo, tagihan kartu kredit Anda bulan ini Rp 1.250.000. Jatuh tempo 25 Juni.">Normal</button>
        <button class="ex-pill" data-text="Dapatkan GRATIS kuota 5GB untuk pengguna Telkomsel! Ketik REG kirim ke 3636. Berlaku 3 hari.">Promo</button>
        <button class="ex-pill" data-text="Selamat! No Anda menang undian berhadiah Rp50 juta. Konfirmasi nama & no rek Anda ke 0812-xxxx.">Penipuan</button>
        <button class="ex-pill" data-text="Verifikasi OTP: 847291. Jangan berikan kode ini ke siapapun termasuk pihak bank.">OTP</button>
        <button class="ex-pill" data-text="SPESIAL HARI INI! Beli paket internet 20GB hanya Rp25rb. Klik link berikut untuk aktivasi.">Promo 2</button>
      </div>

      <div class="action-row">
        <div style="display:flex;gap:10px;align-items:center;">
          <button class="btn-analyze" id="btn-analyze" disabled>
            <span class="spinner" id="spinner"></span>
            <span id="btn-text">Analisis</span>
          </button>
          <button class="btn-clear" id="btn-clear">Hapus</button>
        </div>
        <div class="api-status">
          <div class="status-dot" id="status-dot"></div>
          <span class="status-text" id="status-text">memeriksa...</span>
        </div>
      </div>
    </div>
  </div>

  <div id="result-section">
    <div class="card">
      <div class="card-header">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/>
          <line x1="6" y1="20" x2="6" y2="14"/><line x1="2" y1="20" x2="22" y2="20"/>
        </svg>
        <span class="card-title">Hasil Prediksi</span>
      </div>
      <div class="card-body">
        <div class="result-grid" id="result-grid"></div>
        <div id="verdict-wrap"></div>
      </div>
    </div>
  </div>

</div>

<script>
const API_BASE = "http://127.0.0.1:8000";
let activeModel = "both";

const input        = document.getElementById("sms-input");
const charCount    = document.getElementById("char-count");
const btnAnalyze   = document.getElementById("btn-analyze");
const btnClear     = document.getElementById("btn-clear");
const btnText      = document.getElementById("btn-text");
const spinner      = document.getElementById("spinner");
const statusDot    = document.getElementById("status-dot");
const statusText   = document.getElementById("status-text");
const resultSec    = document.getElementById("result-section");
const resultGrid   = document.getElementById("result-grid");
const verdictWrap  = document.getElementById("verdict-wrap");
const themeToggle  = document.getElementById("theme-toggle");
const themeLabel   = document.getElementById("theme-label");
const iconSun      = document.getElementById("icon-sun");
const iconMoon     = document.getElementById("icon-moon");

let isDark = true;
themeToggle.addEventListener("click", () => {
  isDark = !isDark;
  document.documentElement.setAttribute("data-theme", isDark ? "dark" : "light");
  themeLabel.textContent = isDark ? "Light" : "Dark";
  iconSun.style.display  = isDark ? "block" : "none";
  iconMoon.style.display = isDark ? "none"  : "block";
});

const pct = v => (v * 100).toFixed(1) + "%";
const cap = s => s.charAt(0).toUpperCase() + s.slice(1);
const MODEL_NAMES = { indobert: "IndoBERT", xlmroberta: "XLM-RoBERTa" };

async function checkHealth() {
  try {
    const r = await fetch(`${API_BASE}/health`, { signal: AbortSignal.timeout(3000) });
    if (r.ok) {
      const d = await r.json();
      const loaded = d.loaded_models || [];
      statusDot.className = "status-dot online";
      statusText.textContent = loaded.length > 0
        ? `API online · ${loaded.length} model dimuat`
        : "API online · mode mock";
      statusText.style.color = "var(--text-muted)";
    } else throw new Error();
  } catch {
    statusDot.className = "status-dot offline";
    statusText.textContent = "API offline · jalankan uvicorn";
    statusText.style.color = "var(--red)";
  }
}

input.addEventListener("input", () => {
  const len = input.value.length;
  charCount.textContent = `${len} / 500`;
  btnAnalyze.disabled = len === 0;
});

document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeModel = btn.dataset.model;
  });
});

document.querySelectorAll(".ex-pill").forEach(pill => {
  pill.addEventListener("click", () => {
    input.value = pill.dataset.text;
    input.dispatchEvent(new Event("input"));
    input.focus();
  });
});

btnClear.addEventListener("click", () => {
  input.value = "";
  input.dispatchEvent(new Event("input"));
  resultSec.classList.remove("visible");
  setTimeout(() => { resultGrid.innerHTML = ""; verdictWrap.innerHTML = ""; }, 400);
});

function buildResultCard(modelKey, res) {
  const { label, confidence, scores, mode, latency_ms } = res;
  const delay = modelKey === "xlmroberta" ? "0.1s" : "0s";

  const scoreRows = ["normal", "promo", "penipuan"].map(l => `
    <div class="score-row">
      <span class="score-name">${l}</span>
      <div class="score-bar-bg">
        <div class="score-bar-fill ${l}" style="width:0%" data-target="${(scores[l]*100).toFixed(1)}%"></div>
      </div>
      <span class="score-pct">${pct(scores[l])}</span>
    </div>`).join("");

  return `
    <div class="model-result-card result-${label}" style="animation-delay:${delay}">
      <div class="result-model-name">${MODEL_NAMES[modelKey] || modelKey}</div>
      <div class="result-label-wrap">
        <div class="result-indicator ${label}"></div>
        <span class="result-label ${label}">${cap(label)}</span>
      </div>
      <div class="confidence-block">
        <div class="conf-header">
          <span>Confidence</span>
          <span class="conf-val">${pct(confidence)}</span>
        </div>
        <div class="conf-bar-bg">
          <div class="conf-bar-fill ${label}" style="width:0%" data-target="${pct(confidence)}"></div>
        </div>
      </div>
      <div class="scores-wrap">${scoreRows}</div>
      <div class="result-meta">
        <span class="meta-mode">${mode}</span>
        <span>${latency_ms} ms</span>
      </div>
    </div>`;
}

function animateBars() {
  requestAnimationFrame(() => {
    document.querySelectorAll("[data-target]").forEach(el => {
      setTimeout(() => { el.style.width = el.dataset.target; }, 50);
    });
  });
}

const SVG_AGREE = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>`;
const SVG_DIFF  = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>`;

function buildVerdict(results) {
  const keys = Object.keys(results);
  if (keys.length < 2) return "";
  const [a, b] = keys;
  if (results[a].label === results[b].label) {
    return `
      <div class="verdict-card">
        <div class="verdict-icon-wrap">${SVG_AGREE}</div>
        <div class="verdict-text">
          <strong>Kedua model sepakat:</strong> Pesan ini diklasifikasikan sebagai
          <strong>${cap(results[a].label)}</strong>.
          IndoBERT (${pct(results[a].confidence)}) &amp; XLM-RoBERTa (${pct(results[b].confidence)}).
        </div>
      </div>`;
  } else {
    const winner = results[a].confidence >= results[b].confidence ? a : b;
    return `
      <div class="verdict-card">
        <div class="verdict-icon-wrap">${SVG_DIFF}</div>
        <div class="verdict-text">
          <strong>Kedua model berbeda pendapat.</strong>
          ${MODEL_NAMES[winner]} lebih percaya diri dengan label
          <strong>${cap(results[winner].label)}</strong> (${pct(results[winner].confidence)}).
          Ini bisa menunjukkan pesan yang ambigu atau mengandung code-switching.
        </div>
      </div>`;
  }
}

async function analyze() {
  const text = input.value.trim();
  if (!text) return;
  btnAnalyze.disabled = true;
  spinner.style.display = "block";
  btnText.textContent = "Menganalisis...";
  try {
    const res = await fetch(`${API_BASE}/predict`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text, model: activeModel }),
    });
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.detail || "Terjadi kesalahan pada server.");
    }
    const data = await res.json();
    resultGrid.innerHTML = Object.entries(data.results)
      .map(([key, result]) => buildResultCard(key, result)).join("");
    verdictWrap.innerHTML = buildVerdict(data.results);
    resultSec.classList.add("visible");
    animateBars();
    setTimeout(() => resultSec.scrollIntoView({ behavior:"smooth", block:"nearest" }), 100);
  } catch (e) {
    resultGrid.innerHTML = `
      <div style="grid-column:1/-1;text-align:center;padding:32px;color:var(--red);">
        <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" style="margin-bottom:12px;display:block;margin-left:auto;margin-right:auto;">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <div style="font-family:var(--font-mono);font-size:13px;">${e.message}</div>
        <div style="font-size:12px;color:var(--text-dim);margin-top:8px;">
          Pastikan backend berjalan: <code>uvicorn main:app --reload</code>
        </div>
      </div>`;
    verdictWrap.innerHTML = "";
    resultSec.classList.add("visible");
  } finally {
    spinner.style.display = "none";
    btnText.textContent = "Analisis";
    btnAnalyze.disabled = input.value.length === 0;
  }
}

btnAnalyze.addEventListener("click", analyze);
input.addEventListener("keydown", e => {
  if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) analyze();
});

checkHealth();
setInterval(checkHealth, 15000);
</script>
</body>
</html>
