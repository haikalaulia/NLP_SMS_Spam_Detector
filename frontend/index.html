<!doctype html>
<html lang="id" data-theme="dark">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>SpamSense — Detektor SMS Spam Indonesia</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link
            href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        <div class="topbar">
            <button class="theme-toggle" id="theme-toggle" title="Ganti tema">
                <svg
                    id="icon-sun"
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                    stroke-width="2"
                >
                    <circle cx="12" cy="12" r="5" />
                    <line x1="12" y1="1" x2="12" y2="3" />
                    <line x1="12" y1="21" x2="12" y2="23" />
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                    <line x1="1" y1="12" x2="3" y2="12" />
                    <line x1="21" y1="12" x2="23" y2="12" />
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
                </svg>
                <svg
                    id="icon-moon"
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                    stroke-width="2"
                    style="display: none"
                >
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
                </svg>
                <span class="theme-toggle-label" id="theme-label">Light</span>
            </button>
        </div>
        <div class="wrapper">
            <header>
                <div class="badge">
                    <span class="badge-dot"></span>
                    NLP · IndoBERT vs XLM-RoBERTa
                </div>
                <h1>SpamSense</h1>
                <p class="tagline">
                    Detektor SMS Spam Bahasa Indonesia berbasis deep learning —
                    klasifikasi tiga kelas secara real-time.
                </p>
            </header>
            <div class="legend">
                <div class="legend-item">
                    <div class="legend-dot normal"></div>
                    <span>Normal — pesan biasa</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot promo"></div>
                    <span>Promo — iklan / penawaran operator</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot penipuan"></div>
                    <span>Penipuan — scam / phishing</span>
                </div>
            </div>
            <div class="card" style="margin-top: 20px">
                <div class="card-header">
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke="currentColor"
                        stroke-width="2"
                    >
                        <circle cx="11" cy="11" r="8" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                    </svg>
                    <span class="card-title">Analisis Pesan SMS</span>
                </div>
                <div class="card-body">
                    <div class="model-tabs">
                        <button class="tab-btn active" data-model="both">
                            Bandingkan Keduanya
                        </button>
                        <button class="tab-btn" data-model="indobert">
                            IndoBERT <span class="model-badge">mono</span>
                        </button>
                        <button class="tab-btn" data-model="xlmroberta">
                            XLM-RoBERTa <span class="model-badge">multi</span>
                        </button>
                    </div>
                    <div class="input-wrap">
                        <textarea
                            id="sms-input"
                            placeholder="Ketik atau tempel teks SMS di sini..."
                            maxlength="500"
                        ></textarea>
                        <span class="char-count" id="char-count">0 / 500</span>
                    </div>
                    <div class="examples-wrap">
                        <span class="ex-label">Contoh</span>
                        <button
                            class="ex-pill"
                            data-text="Halo, tagihan kartu kredit Anda bulan ini Rp 1.250.000. Jatuh tempo 25 Juni."
                        >
                            Normal
                        </button>
                        <button
                            class="ex-pill"
                            data-text="Dapatkan GRATIS kuota 5GB untuk pengguna Telkomsel! Ketik REG kirim ke 3636. Berlaku 3 hari."
                        >
                            Promo
                        </button>
                        <button
                            class="ex-pill"
                            data-text="Selamat! No Anda menang undian berhadiah Rp50 juta. Konfirmasi nama & no rek Anda ke 0812-xxxx."
                        >
                            Penipuan
                        </button>
                        <button
                            class="ex-pill"
                            data-text="Verifikasi OTP: 847291. Jangan berikan kode ini ke siapapun termasuk pihak bank."
                        >
                            OTP
                        </button>
                        <button
                            class="ex-pill"
                            data-text="SPESIAL HARI INI! Beli paket internet 20GB hanya Rp25rb. Klik link berikut untuk aktivasi."
                        >
                            Promo 2
                        </button>
                    </div>
                    <div class="action-row">
                        <div
                            style="
                                display: flex;
                                gap: 10px;
                                align-items: center;
                            "
                        >
                            <button
                                class="btn-analyze"
                                id="btn-analyze"
                                disabled
                            >
                                <span class="spinner" id="spinner"></span>
                                <span id="btn-text">Analisis</span>
                            </button>
                            <button class="btn-clear" id="btn-clear">
                                Hapus
                            </button>
                        </div>
                        <div class="api-status">
                            <div class="status-dot" id="status-dot"></div>
                            <span class="status-text" id="status-text"
                                >memeriksa...</span
                            >
                        </div>
                    </div>
                </div>
            </div>
            <div id="result-section">
                <div class="card">
                    <div class="card-header">
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            fill="none"
                            viewBox="0 0 24 24"
                            stroke="currentColor"
                            stroke-width="2"
                        >
                            <line x1="18" y1="20" x2="18" y2="10" />
                            <line x1="12" y1="20" x2="12" y2="4" />
                            <line x1="6" y1="20" x2="6" y2="14" />
                            <line x1="2" y1="20" x2="22" y2="20" />
                        </svg>
                        <span class="card-title">Hasil Prediksi</span>
                    </div>
                    <div class="card-body">
                        <div class="result-grid" id="result-grid"></div>
                        <div id="verdict-wrap"></div>
                    </div>
                </div>
            </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
